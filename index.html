<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOORULAIN | Pak Premium Hub</title>
    <style>
        :root { --bg: #0b0f19; --card: #151f32; --red: #f43f5e; --green: #10b981; --blue: #3b82f6; --txt: #f8fafc; --muted: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--txt); margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        h2 { border-left: 5px solid var(--red); padding-left: 10px; margin-top: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 15px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 8px; }
        .b-drama { background: var(--red); }
        .b-cric { background: var(--blue); }
        .b-deal { background: var(--green); }
        .btn { display: block; text-align: center; padding: 10px; color: white; text-decoration: none; border-radius: 6px; margin-top: 10px; }
        .btn-red { background: #e11d48; }
        .btn-blue { background: #2563eb; }
        .btn-green { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎭 Trending Pakistani Serials (Top 10)</h2>
        <div class="grid">
            <!-- Items 1-10 (As in prompt) -->
            <div class="card"><img src="..." class="card-img"><div class="card-content"><span class="badge b-drama">...</span><h3>...</h3><p>...</p><a href="..." class="btn btn-red">...</a></div></div>
            <!-- Repeat for 10 cards using Unsplash images -->
        </div>

        <h2 style="border-left-color: var(--blue);">🏏 Live Cricket News</h2>
        <div class="grid">
            <!-- Cricket Cards -->
            <div class="card"><img src="..." class="card-img"><div class="card-content"><span class="badge b-cric">...</span><h3>...</h3><p>...</p><a href="..." class="btn btn-blue">...</a></div></div>
        </div>

        <h2 style="border-left-color: var(--green);">🛍 Hot Daraz Deals</h2>
        <div class="grid">
            <!-- Daraz Items 1-10 -->
            <div class="card"><img src="..." class="card-img"><div class="card-content"><span class="badge b-deal">...</span><h3>...</h3><p>...</p><div class="price">...</div><a href="..." class="btn btn-green">...</a></div></div>
        </div>
    </div>
</body>
</html>
